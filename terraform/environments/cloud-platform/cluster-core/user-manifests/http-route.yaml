apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: test-workload
spec:
  parentRefs:
    - name: shared-alb
      namespace: lbc-test
  hostnames:
    - "echo2.cp-0806-1125.development.container-platform.service.justice.gov.uk"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 80
