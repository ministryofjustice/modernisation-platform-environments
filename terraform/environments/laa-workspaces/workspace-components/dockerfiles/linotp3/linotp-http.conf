<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /usr/lib/python3/dist-packages/linotp

    WSGIDaemonProcess linotp processes=1 threads=15 \
        python-home=/usr \
        user=linotp group=linotp \
        display-name=%{GROUP}
    WSGIProcessGroup linotp
    WSGIScriptAlias / /usr/lib/python3/dist-packages/linotp/lib/wsgi.py

    <Directory /usr/lib/python3/dist-packages/linotp>
        Require all granted
    </Directory>

    <Files wsgi.py>
        Require all granted
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/linotp_error.log
    CustomLog ${APACHE_LOG_DIR}/linotp_access.log combined

    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
</VirtualHost>
