---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      external-dns.alpha.kubernetes.io/hostname: "{{ .Values.gatewayHostname }}"
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "{{ .Values.gatewayHostname }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: shared-gateway-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway.data-platform.service.justice.gov.uk/shared-gateway-access: "true"
