apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/title: Require Requests and Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      This policy validates that all containers have CPU and memory resource
      requests and memory limits defined.
spec:
  validationActions:
    - {{ .Values.validationAction }}
  evaluation:
    background:
      enabled: true
  autogen:
    podControllers:
      controllers:
        - deployments
        - statefulsets
        - daemonsets
        - jobs
        - cronjobs
        - replicasets
        - replicationcontrollers
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  variables:
    - name: allContainers
      expression: >-
        object.spec.containers
        + object.spec.?initContainers.orValue([])
        + object.spec.?ephemeralContainers.orValue([])
  validations:
    - expression: >-
        variables.allContainers.all(c, has(c.resources)
        && has(c.resources.requests)
        && has(c.resources.requests.memory) && c.resources.requests.memory != ''
        && has(c.resources.requests.cpu) && c.resources.requests.cpu != ''
        && has(c.resources.limits)
        && has(c.resources.limits.memory) && c.resources.limits.memory != '')
      message: "CPU and memory resource requests and memory limits are required for containers."
