apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-default-service-account
  annotations:
    policies.kyverno.io/title: Disallow Default ServiceAccount
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Pods that do not name a ServiceAccount are assigned the namespace's
      'default' ServiceAccount, which makes access hard to reason about and
      audit. This policy requires every Pod to run as an explicitly named,
      non-default ServiceAccount so that RBAC can be scoped per workload. An
      empty serviceAccountName is also rejected so pod controller templates must
      set one explicitly.
spec:
  validationActions:
    - {{ .Values.validationAction }}
  evaluation:
    background:
      enabled: true
  autogen:
    podControllers:
      controllers:
        - deployments
        - statefulsets
        - daemonsets
        - jobs
        - cronjobs
        - replicasets
        - replicationcontrollers
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  variables:
    - name: serviceAccount
      expression: object.spec.?serviceAccountName.orValue('')
  validations:
    - expression: >-
        variables.serviceAccount != '' && variables.serviceAccount != 'default'
      message: "Pods must run as an explicitly named, non-default ServiceAccount; set spec.serviceAccountName."
