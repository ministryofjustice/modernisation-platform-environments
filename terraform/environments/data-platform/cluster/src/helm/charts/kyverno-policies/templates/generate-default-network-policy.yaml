apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-default-network-policy
  annotations:
    policies.kyverno.io/title: Generate Default Deny NetworkPolicy
    policies.kyverno.io/category: Multi-Tenancy, Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: NetworkPolicy
    policies.kyverno.io/description: >-
      On namespace creation, generate a default-deny NetworkPolicy that blocks
      all ingress and all egress except DNS to CoreDNS. Teams then explicitly
      allow the traffic their workloads need. System and platform namespaces are
      skipped.
spec:
  evaluation:
    # Keep the generated NetworkPolicy in sync: recreate it if deleted, update
    # it if this policy changes, and remove it if the namespace is deleted.
    synchronize:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["namespaces"]
  matchConditions:
    # Skip system/platform namespaces. Matched by name (not by label) so that
    # namespaces created outside the namespace module are still locked down by
    # default. Keep this list in step with resourceFiltersExcludeNamespaces.
    - name: skip-system-namespaces
      expression: >-
        !object.metadata.name.startsWith('kube-')
        && !(object.metadata.name in ['kyverno', 'cilium-secrets', 'karpenter',
        'cert-manager', 'external-dns', 'external-secrets', 'metrics-server',
        'prometheus', 'fluent-bit', 'cluster-autoscaler', 'amazon-guardduty',
        'amazon-network-flow-monitor', 'keda', 'shared-services',
        'aws-cloudwatch-observability'])
  variables:
    - name: nsName
      expression: object.metadata.name
    - name: downstream
      expression: >-
        [
          {
            "kind": dyn("NetworkPolicy"),
            "apiVersion": dyn("networking.k8s.io/v1"),
            "metadata": dyn({
              "name": "default-deny",
              "namespace": string(variables.nsName)
            }),
            "spec": dyn({
              "podSelector": dyn({}),
              "policyTypes": dyn(["Ingress", "Egress"]),
              "egress": dyn([
                dyn({
                  "to": dyn([
                    dyn({
                      "namespaceSelector": dyn({
                        "matchLabels": dyn({"kubernetes.io/metadata.name": "kube-system"})
                      }),
                      "podSelector": dyn({
                        "matchLabels": dyn({"k8s-app": "coredns"})
                      })
                    })
                  ]),
                  "ports": dyn([
                    dyn({"protocol": dyn("UDP"), "port": dyn(53)}),
                    dyn({"protocol": dyn("TCP"), "port": dyn(53)})
                  ])
                })
              ])
            })
          }
        ]
  generate:
    - expression: generator.Apply(variables.nsName, variables.downstream)
