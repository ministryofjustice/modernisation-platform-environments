---
apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: ai-gateway
  namespace: ai-gateway
spec:
  loadBalancerName: ai-gateway
  scheme: internet-facing
  loadBalancerAttributes:
    - key: load_balancing.cross_zone.enabled
      value: "true"
  listenerConfigurations:
    - protocolPort: HTTPS:443
      defaultCertificate: arn:aws:acm:eu-west-2:259787491607:certificate/5c8e3b71-a7d7-453d-a1df-5b15848e15d3
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway
  namespace: ai-gateway
  annotations:
    external-dns.alpha.kubernetes.io/hostname: test.ai-gateway.justice.gov.uk
spec:
  gatewayClassName: aws-alb
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: ai-gateway
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: test.ai-gateway.justice.gov.uk
---
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: litellm
  namespace: ai-gateway
spec:
  targetReference:
    name: litellm
  defaultConfiguration:
    targetType: instance
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-gateway
  namespace: ai-gateway
spec:
  parentRefs:
    - name: ai-gateway
      sectionName: https
  rules:
    - backendRefs:
        - name: litellm
          port: 4000
