---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-gateway
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - name: ai-gateway
      sectionName: https
  rules:
    - backendRefs:
        - name: litellm
          port: 4000
