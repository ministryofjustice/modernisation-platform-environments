---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-gateway
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - name: ai-gateway
      sectionName: https
  rules:
    - backendRefs:
        - name: litellm
          port: 4000

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-gateway-http-redirect
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - name: ai-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
