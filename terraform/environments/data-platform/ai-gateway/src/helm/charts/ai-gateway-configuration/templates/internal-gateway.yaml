---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway-internal
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: aws-alb
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: ai-gateway-internal
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ .Values.internalHostname }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.internalHostname }}
