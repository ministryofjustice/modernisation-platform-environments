###############################################################################
# AC2: NodePool for Spot Instance Diversification
#
# Auto Mode uses NodePool CRDs (Karpenter API) to configure instance selection.
# This NodePool enables Spot capacity with diversified instance families to
# validate cost optimisation without sacrificing availability.
#
# NOTE: Auto Mode's built-in "general-purpose" NodePool uses on-demand by
# default. This additional NodePool tests Spot behaviour specifically.
###############################################################################
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: us106-spot-validation
  labels:
    validation: us-106
spec:
  template:
    metadata:
      labels:
        capacity-type: spot
        validation: us-106
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default  # Auto Mode's built-in NodeClass
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m5.large
            - m5.xlarge
            - m5a.large
            - m5a.xlarge
            - m6i.large
            - m6i.xlarge
            - m6a.large
            - m6a.xlarge
            - m7i.large
            - m7i.xlarge
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - eu-west-2a
            - eu-west-2b
            - eu-west-2c
  limits:
    cpu: "32"
    memory: "64Gi"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
---
###############################################################################
# Deployment targeting the Spot NodePool
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: us106-spot-workload
  namespace: default
  labels:
    app: us106-spot-workload
    validation: us-106
spec:
  replicas: 0  # Start at 0, scale up during test
  selector:
    matchLabels:
      app: us106-spot-workload
  template:
    metadata:
      labels:
        app: us106-spot-workload
        validation: us-106
    spec:
      terminationGracePeriodSeconds: 0
      nodeSelector:
        capacity-type: spot
      containers:
        - name: pause
          image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
