name: Build and Push LinOTP ECS Images

on:
  push:
    branches:
      - main
      - STB-4290-v1  # Your current branch
    paths:
      - 'terraform/environments/laa-workspaces/workspace-components/dockerfiles/**'
      - '.github/workflows/build-linotp-images.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.MODERNISATION_PLATFORM_ENVIRONMENTS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Build and push LinOTP 3 image
        working-directory: terraform/environments/laa-workspaces/workspace-components/dockerfiles/linotp3
        env:
          ECR_REGISTRY: ${{ steps.account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: laa-workspaces/linotp3
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "LinOTP image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Build and push FreeRADIUS image
        working-directory: terraform/environments/laa-workspaces/workspace-components/dockerfiles/freeradius
        env:
          ECR_REGISTRY: ${{ steps.account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: laa-workspaces/freeradius-linotp
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "FreeRADIUS image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Force ECS service deployment
        run: |
          aws ecs update-service \
            --cluster laa-workspaces-development \
            --service laa-workspaces-development-linotp3 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "ECS service deployment triggered"

      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize (this may take 3-5 minutes)..."
          aws ecs wait services-stable \
            --cluster laa-workspaces-development \
            --services laa-workspaces-development-linotp3 \
            --region ${{ env.AWS_REGION }}
          echo "Service is now stable"

      - name: Check service status
        run: |
          aws ecs describe-services \
            --cluster laa-workspaces-development \
            --services laa-workspaces-development-linotp3 \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].{desired:desiredCount,running:runningCount,pending:pendingCount}'
