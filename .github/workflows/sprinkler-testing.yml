---

## to force a run #

name: sprinkler-testing
on:
  push:
    branches:
      - issue/9293-workflow-changes

  pull_request:
    branches:
      - main
    paths:
      - 'terraform/environments/sprinkler-testing/**'
      - '.github/workflows/sprinkler.yml'

  workflow_dispatch:
    inputs:
      action:
        description: 'Set either [deploy|destroy].'
        default: 'deploy'
        required: true
        type: string
        options:
          - deploy
          - destroy

permissions:
  id-token: write  # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  strategy:
    uses: ./.github/workflows/testing_reusable_terraform_components_strategy.yml
    with:
      application: "sprinkler"
      
  terraform:
    needs: strategy
    if: join(fromJson(needs.strategy.outputs.matrix).include) != ''
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.strategy.outputs.matrix) }}
    uses: ./.github/workflows/testing_reusable_terraform_components_plan_apply.yml
    with:
      application: "sprinkler"
      environment: "${{ matrix.target }}"
      action: "${{ matrix.action }}"
      component: "${{ matrix.component }}"
    secrets:
      MODERNISATION_PLATFORM_ACCOUNT_ID: ${{ secrets.MODERNISATION_PLATFORM_ACCOUNT_ID }}
      PASSPHRASE: ${{ secrets.PASSPHRASE }}


