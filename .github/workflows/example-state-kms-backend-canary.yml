---
name: example-state-kms-backend-canary

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Set either [deploy|destroy]."
        default: "deploy"
        required: true
        type: choice
        options:
          - deploy
          - destroy

permissions:
  id-token: write
  contents: read

env:
  EXAMPLE_WORKSPACE_NAME: "example-development"
  COOKER_WORKSPACE_NAME: "cooker-development"
  BOOTSTRAP_DIR: "terraform/environments/example/state-kms-backend-bootstrap"
  CANARY_DIR: "terraform/environments/cooker/example-state-kms-backend-canary"
  CANARY_KMS_ALIAS_NAME: "alias/example-terraform-state-kms-backend-canary"

jobs:
  fetch-secrets:
    uses: ministryofjustice/modernisation-platform-github-actions/.github/workflows/aws-secrets-management.yml@91d5c1efbe43e1c8fdfc55fd39e8183fc6be8fa8 # v6.1.1
    secrets:
      MODERNISATION_PLATFORM_ACCOUNT_NUMBER: ${{ secrets.MODERNISATION_PLATFORM_ACCOUNT_ID }}
      PASSPHRASE: ${{ secrets.PASSPHRASE }}

  deploy-bootstrap:
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    needs: fetch-secrets
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@91d5c1efbe43e1c8fdfc55fd39e8183fc6be8fa8 # v6.1.1
        with:
          environment_management: ${{ needs.fetch-secrets.outputs.environment_management }}
          github_ci_user_environments_repo_pat: ${{ needs.fetch-secrets.outputs.github_ci_user_environments_repo_pat }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}

      - name: Set Environment Variables
        run: |
          echo "GITHUB_TOKEN=$GITHUB_CI_USER_ENVIRONMENTS_REPO_PAT" >> "$GITHUB_ENV"

      - name: Get AWS Account Numbers
        run: |
          account_number=$(jq -r -e --arg account_name "${EXAMPLE_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          canary_writer_account_id=$(jq -r -e --arg account_name "${COOKER_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          backend_number=$(jq -r -e '.modernisation_platform_account_id' <<< "$ENVIRONMENT_MANAGEMENT")
          modernisation_platform_ou_id=$(jq -r -e '.modernisation_platform_organisation_unit_id' <<< "$ENVIRONMENT_MANAGEMENT")
          echo "::add-mask::$account_number"
          echo "::add-mask::$canary_writer_account_id"
          echo "::add-mask::$backend_number"
          echo "::add-mask::$modernisation_platform_ou_id"
          echo "ACCOUNT_NUMBER=${account_number}" >> "$GITHUB_ENV"
          echo "BACKEND_NUMBER=${backend_number}" >> "$GITHUB_ENV"
          echo "TF_VAR_canary_writer_account_id=${canary_writer_account_id}" >> "$GITHUB_ENV"
          echo "TF_VAR_modernisation_platform_organisation_unit_id=${modernisation_platform_ou_id}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_NUMBER }}:role/github-actions-apply"
          role-session-name: "githubactionsrolesession"
          aws-region: "eu-west-2"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1"
          terraform_wrapper: false

      - name: Terraform Apply Bootstrap
        working-directory: ${{ env.BOOTSTRAP_DIR }}
        run: |
          set -euo pipefail
          terraform init -input=false -no-color
          terraform workspace select "${EXAMPLE_WORKSPACE_NAME}" || terraform workspace new "${EXAMPLE_WORKSPACE_NAME}"
          terraform plan \
            -target=aws_kms_key.state_kms_backend_canary \
            -target=aws_kms_alias.state_kms_backend_canary \
            -target=aws_s3_bucket.state_kms_backend_canary \
            -target=aws_s3_bucket_public_access_block.state_kms_backend_canary \
            -target=aws_s3_bucket_ownership_controls.state_kms_backend_canary \
            -target=aws_s3_bucket_versioning.state_kms_backend_canary \
            -target=aws_s3_bucket_server_side_encryption_configuration.state_kms_backend_canary \
            -target=aws_s3_bucket_policy.state_kms_backend_canary \
            -out=state-kms-backend-bootstrap.tfplan
          terraform apply state-kms-backend-bootstrap.tfplan

  deploy-canary:
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    needs:
      - fetch-secrets
      - deploy-bootstrap
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@91d5c1efbe43e1c8fdfc55fd39e8183fc6be8fa8 # v6.1.1
        with:
          environment_management: ${{ needs.fetch-secrets.outputs.environment_management }}
          github_ci_user_environments_repo_pat: ${{ needs.fetch-secrets.outputs.github_ci_user_environments_repo_pat }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}

      - name: Set Environment Variables
        run: |
          echo "GITHUB_TOKEN=$GITHUB_CI_USER_ENVIRONMENTS_REPO_PAT" >> "$GITHUB_ENV"

      - name: Get AWS Account Number
        run: |
          example_account_number=$(jq -r -e --arg account_name "${EXAMPLE_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          cooker_account_number=$(jq -r -e --arg account_name "${COOKER_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          echo "::add-mask::$example_account_number"
          echo "::add-mask::$cooker_account_number"
          echo "ACCOUNT_NUMBER=${cooker_account_number}" >> "$GITHUB_ENV"
          echo "TERRAFORM_STATE_KMS_KEY_ID=arn:aws:kms:eu-west-2:${example_account_number}:${CANARY_KMS_ALIAS_NAME}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_NUMBER }}:role/github-actions-apply"
          role-session-name: "githubactionsrolesession"
          aws-region: "eu-west-2"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1"
          terraform_wrapper: false

      - name: Terraform Apply Canary
        working-directory: ${{ env.CANARY_DIR }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/terraform-init.sh" "${PWD}"
          terraform workspace select "${COOKER_WORKSPACE_NAME}" || terraform workspace new "${COOKER_WORKSPACE_NAME}"
          terraform plan -out=state-kms-backend-canary.tfplan
          terraform apply state-kms-backend-canary.tfplan

  destroy-canary:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs: fetch-secrets
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@91d5c1efbe43e1c8fdfc55fd39e8183fc6be8fa8 # v6.1.1
        with:
          environment_management: ${{ needs.fetch-secrets.outputs.environment_management }}
          github_ci_user_environments_repo_pat: ${{ needs.fetch-secrets.outputs.github_ci_user_environments_repo_pat }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}

      - name: Get AWS Account Number
        run: |
          example_account_number=$(jq -r -e --arg account_name "${EXAMPLE_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          cooker_account_number=$(jq -r -e --arg account_name "${COOKER_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          echo "::add-mask::$example_account_number"
          echo "::add-mask::$cooker_account_number"
          echo "ACCOUNT_NUMBER=${cooker_account_number}" >> "$GITHUB_ENV"
          echo "TERRAFORM_STATE_KMS_KEY_ID=arn:aws:kms:eu-west-2:${example_account_number}:${CANARY_KMS_ALIAS_NAME}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_NUMBER }}:role/github-actions-apply"
          role-session-name: "githubactionsrolesession"
          aws-region: "eu-west-2"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1"
          terraform_wrapper: false

      - name: Terraform Destroy Canary
        working-directory: ${{ env.CANARY_DIR }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/terraform-init.sh" "${PWD}"
          terraform workspace select "${COOKER_WORKSPACE_NAME}"
          terraform destroy -auto-approve

  destroy-bootstrap:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    needs:
      - fetch-secrets
      - destroy-canary
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@91d5c1efbe43e1c8fdfc55fd39e8183fc6be8fa8 # v6.1.1
        with:
          environment_management: ${{ needs.fetch-secrets.outputs.environment_management }}
          github_ci_user_environments_repo_pat: ${{ needs.fetch-secrets.outputs.github_ci_user_environments_repo_pat }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}

      - name: Get AWS Account Numbers
        run: |
          account_number=$(jq -r -e --arg account_name "${EXAMPLE_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          canary_writer_account_id=$(jq -r -e --arg account_name "${COOKER_WORKSPACE_NAME}" '.account_ids[$account_name]' <<< "$ENVIRONMENT_MANAGEMENT")
          backend_number=$(jq -r -e '.modernisation_platform_account_id' <<< "$ENVIRONMENT_MANAGEMENT")
          modernisation_platform_ou_id=$(jq -r -e '.modernisation_platform_organisation_unit_id' <<< "$ENVIRONMENT_MANAGEMENT")
          echo "::add-mask::$account_number"
          echo "::add-mask::$canary_writer_account_id"
          echo "::add-mask::$backend_number"
          echo "::add-mask::$modernisation_platform_ou_id"
          echo "ACCOUNT_NUMBER=${account_number}" >> "$GITHUB_ENV"
          echo "BACKEND_NUMBER=${backend_number}" >> "$GITHUB_ENV"
          echo "TF_VAR_canary_writer_account_id=${canary_writer_account_id}" >> "$GITHUB_ENV"
          echo "TF_VAR_modernisation_platform_organisation_unit_id=${modernisation_platform_ou_id}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_NUMBER }}:role/github-actions-apply"
          role-session-name: "githubactionsrolesession"
          aws-region: "eu-west-2"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1"
          terraform_wrapper: false

      - name: Terraform Destroy Bootstrap
        working-directory: ${{ env.BOOTSTRAP_DIR }}
        run: |
          set -euo pipefail
          terraform init -input=false -no-color
          terraform workspace select "${EXAMPLE_WORKSPACE_NAME}"
          terraform destroy \
            -target=aws_s3_bucket_policy.state_kms_backend_canary \
            -target=aws_s3_bucket_server_side_encryption_configuration.state_kms_backend_canary \
            -target=aws_s3_bucket_versioning.state_kms_backend_canary \
            -target=aws_s3_bucket_ownership_controls.state_kms_backend_canary \
            -target=aws_s3_bucket_public_access_block.state_kms_backend_canary \
            -target=aws_s3_bucket.state_kms_backend_canary \
            -target=aws_kms_alias.state_kms_backend_canary \
            -target=aws_kms_key.state_kms_backend_canary \
            -auto-approve
